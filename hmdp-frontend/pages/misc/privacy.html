<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>隐私设置 - 周边优速通</title>
  <link rel="stylesheet" href="/css/element.css">
  <link href="/css/main.css" rel="stylesheet">
  <style>
    :root {
      --p-primary: #FF7A45;
      --p-bg: #FDFBF9;
      --p-surface: #FFFFFF;
      --p-text: #3A3432;
      --p-sub: #8A817C;
      --p-border: #F0ECE8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--p-bg);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      color: var(--p-text); -webkit-font-smoothing: antialiased;
    }
    .page { max-width: 390px; margin: 0 auto; min-height: 100vh; padding-bottom: 40px; }

    .header {
      position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      background: rgba(253,251,249,0.88);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,0,0,0.04);
    }
    .back-btn {
      width: 36px; height: 36px; border: none; border-radius: 50%;
      background: rgba(255,122,69,0.10); color: var(--p-primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; cursor: pointer;
    }
    .header-title { flex: 1; font-size: 17px; font-weight: 700; }

    .section {
      margin: 12px 12px 0; padding: 0;
      background: var(--p-surface); border-radius: 20px;
      box-shadow: 0 8px 24px rgba(255,122,69,0.06); overflow: hidden;
    }
    .section-title {
      padding: 14px 16px 8px; font-size: 13px; font-weight: 700;
      color: var(--p-sub); letter-spacing: 0.02em;
    }
    .setting-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--p-border);
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-label { font-size: 14px; font-weight: 600; }
    .setting-desc { font-size: 11px; color: var(--p-sub); margin-top: 2px; }

    .save-area {
      margin: 20px 12px; text-align: center;
    }
    .save-btn {
      width: 100%; padding: 14px; border: none; border-radius: 14px;
      background: linear-gradient(135deg, var(--p-primary) 0%, #FF9C6E 100%);
      color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
      box-shadow: 0 8px 24px rgba(255,122,69,0.25);
      transition: all 0.2s;
    }
    .save-btn:active { transform: scale(0.97); }

    .info-banner {
      margin: 12px 12px 0; padding: 12px 14px;
      background: rgba(99,102,241,0.06); border-radius: 14px;
      font-size: 12px; color: #6366f1; line-height: 1.5;
      display: flex; align-items: flex-start; gap: 8px;
    }
    .info-banner i { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  </style>
</head>
<body>
<div id="app" class="page">
  <div class="header">
    <button class="back-btn" onclick="history.back()"><i class="el-icon-arrow-left"></i></button>
    <div class="header-title">隐私设置</div>
  </div>

  <div v-if="loading" style="text-align:center; padding: 60px 0;">
    <i class="el-icon-loading" style="font-size:28px; color:var(--p-primary);"></i>
  </div>

  <template v-else>
    <!-- Social visibility -->
    <div class="section">
      <div class="section-title">社交可见性</div>
      <div class="setting-row">
        <div>
          <div class="setting-label">显示关注列表</div>
          <div class="setting-desc">其他人可以看到你的关注</div>
        </div>
        <el-switch v-model="settings.showFollowing" active-text="开启" inactive-text="关闭"></el-switch>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">显示粉丝列表</div>
          <div class="setting-desc">其他人可以看到你的粉丝</div>
        </div>
        <el-switch v-model="settings.showFollowers" active-text="开启" inactive-text="关闭"></el-switch>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">显示收藏</div>
          <div class="setting-desc">其他人可以看到你收藏的内容</div>
        </div>
        <el-switch v-model="settings.showFavorites" active-text="开启" inactive-text="关闭"></el-switch>
      </div>
    </div>

    <!-- Interaction settings -->
    <div class="section">
      <div class="section-title">互动设置</div>
      <div class="setting-row">
        <div>
          <div class="setting-label">允许陌生人私信</div>
          <div class="setting-desc">未互相关注的人可以给你发消息</div>
        </div>
        <el-switch v-model="settings.allowMessage" active-text="开启" inactive-text="关闭"></el-switch>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">允许被推荐</div>
          <div class="setting-desc">系统可以把你推荐给其他用户</div>
        </div>
        <el-switch v-model="settings.allowRecommend" active-text="开启" inactive-text="关闭"></el-switch>
      </div>
    </div>

    <!-- Stealth & visibility -->
    <div class="section">
      <div class="section-title">浏览与访客</div>
      <div class="setting-row">
        <div>
          <div class="setting-label">显示浏览历史</div>
          <div class="setting-desc">其他人可以看到你的浏览记录</div>
        </div>
        <el-switch v-model="settings.showHistory" active-text="开启" inactive-text="关闭"></el-switch>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">显示在线状态</div>
          <div class="setting-desc">其他人可以看到你是否在线</div>
        </div>
        <el-switch v-model="settings.showOnlineStatus" active-text="开启" inactive-text="关闭"></el-switch>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">隐身访问</div>
          <div class="setting-desc">浏览他人主页时不留下访客足迹</div>
        </div>
        <el-switch v-model="settings.stealthMode" active-text="开启" inactive-text="关闭"></el-switch>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">允许访客通知</div>
          <div class="setting-desc">有人访问你的主页时收到提示</div>
        </div>
        <el-switch v-model="settings.allowVisitNotify" active-text="开启" inactive-text="关闭"></el-switch>
      </div>
    </div>

    <div class="info-banner">
      <i class="el-icon-info"></i>
      <div>开启"隐身访问"后，你浏览他人主页将不会留下足迹，也不会触发对方的访客通知。</div>
    </div>

    <div class="save-area">
      <button class="save-btn" @click="updateSettings">保存设置</button>
    </div>
  </template>
</div>

<script src="/js/vue.js"></script>
<script src="/js/axios.min.js"></script>
<script src="/js/element.js"></script>
<script src="/js/common.js"></script>
<script src="/js/privacy-page.js"></script>
</body>
</html>
