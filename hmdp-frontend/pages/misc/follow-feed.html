<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>关注动态</title>
  <link rel="stylesheet" href="/css/element.css">
  <link href="/css/main.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; min-height: 100vh; background: linear-gradient(180deg,#fff8f3 0%,#f7f8fb 42%,#fff 100%); color: #172033; font-family: "PingFang SC","Microsoft YaHei",sans-serif; }
    .page { width: min(100%, 430px); min-height: 100vh; margin: 0 auto; padding: 16px 16px 36px; }
    .topbar { position: sticky; top: 0; z-index: 20; display: flex; align-items: center; gap: 12px; padding: 8px 0 14px; background: linear-gradient(180deg,rgba(255,248,243,.96),rgba(255,248,243,.72)); backdrop-filter: blur(16px); }
    .back { width: 44px; height: 44px; border: 0; border-radius: 16px; background: #fff1ea; color: #ff6b35; font-size: 18px; }
    .title h1 { margin: 0; font-size: 22px; font-weight: 900; letter-spacing: -.03em; }
    .title p { margin: 4px 0 0; color: #8a817c; font-size: 12px; }
    .feed { display: grid; gap: 14px; }
    .note-card { overflow: hidden; border-radius: 24px; background: rgba(255,255,255,.94); box-shadow: 0 14px 36px rgba(255,107,53,.08); border: 1px solid rgba(255,122,69,.09); }
    .note-cover { width: 100%; aspect-ratio: 1.35/1; object-fit: cover; display: block; background: #fff1ea; }
    .note-body { padding: 14px; }
    .author { display: flex; align-items: center; gap: 9px; margin-bottom: 10px; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; background: #fff1ea; }
    .name { font-size: 13px; font-weight: 800; color: #253047; }
    .time { color: #a29a94; font-size: 11px; }
    .note-title { font-size: 18px; font-weight: 900; line-height: 1.35; margin: 0 0 8px; }
    .note-content { margin: 0; color: #5f6b7a; font-size: 14px; line-height: 1.7; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .note-meta { display: flex; gap: 14px; margin-top: 12px; color: #8a817c; font-size: 12px; }
    .empty, .loading { margin-top: 28px; padding: 36px 18px; text-align: center; border-radius: 24px; background: rgba(255,255,255,.9); color: #8a817c; }
    .empty strong { display: block; margin-bottom: 8px; color: #253047; font-size: 17px; }
  </style>
</head>
<body>
<div id="app" class="page">
  <header class="topbar">
    <button class="back" @click="goBack"><i class="el-icon-arrow-left"></i></button>
    <div class="title">
      <h1>关注动态</h1>
      <p>只看你关注的人最近发布的探店笔记</p>
    </div>
  </header>

  <div v-if="loading && !notes.length" class="loading"><i class="el-icon-loading"></i> 正在加载关注动态...</div>
  <div v-else-if="!notes.length" class="empty">
    <strong>还没有新的关注动态</strong>
    <span>去关注一些会吃会玩的朋友，之后这里就会出现他们的新笔记。</span>
  </div>
  <main v-else class="feed">
    <article class="note-card" v-for="note in notes" :key="note.id" @click="openNote(note)">
      <img class="note-cover" :src="note.cover" alt="" @error="handleImageError">
      <div class="note-body">
        <div class="author">
          <img class="avatar" :src="resolveAvatar(note.icon)" alt="" @error="handleAvatarError">
          <div>
            <div class="name">{{ note.name || '关注用户' }}</div>
            <div class="time">{{ formatDate(note.createTime) }}</div>
          </div>
        </div>
        <h2 class="note-title">{{ note.title || '一篇新的探店笔记' }}</h2>
        <p class="note-content">{{ note.content }}</p>
        <div class="note-meta">
          <span><i class="el-icon-star-off"></i> {{ note.liked || 0 }}</span>
          <span><i class="el-icon-chat-dot-round"></i> {{ note.comments || 0 }}</span>
        </div>
      </div>
    </article>
  </main>
  <div v-if="loading && notes.length" class="loading"><i class="el-icon-loading"></i> 继续加载...</div>
</div>

<script src="/js/vue.js"></script>
<script src="/js/axios.min.js"></script>
<script src="/js/element.js"></script>
<script src="/js/common.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/follow-feed-page.js"></script>
</body>
</html>
