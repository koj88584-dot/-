<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>搜索 - 周边优速通</title>
  <link rel="stylesheet" href="/css/element.css">
  <link href="/css/main.css" rel="stylesheet">
  <style>
    :root {
      --primary: #ff6b35;
      --primary-light: #ff8c61;
      --primary-dark: #e55a2b;
      --bg: #f8f9fa;
      --surface: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --text-tertiary: #999999;
      --border: #f0f0f0;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.5;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      display: flex;
      align-items: center;
      padding: 0 16px;
      z-index: 1000;
      box-shadow: var(--shadow);
    }

    .header-back-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      cursor: pointer;
      border-radius: 50%;
      transition: all 0.3s ease;
    }

    .header-back-btn:hover {
      background: rgba(255,255,255,0.2);
    }

    .search-input-wrapper {
      flex: 1;
      margin: 0 12px;
    }

    .search-input {
      width: 100%;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 20px;
      padding: 0 16px;
      color: white;
      font-size: 15px;
      outline: none;
      transition: all 0.3s ease;
    }

    .search-input::placeholder {
      color: rgba(255,255,255,0.7);
    }

    .search-input:focus {
      background: rgba(255,255,255,0.3);
    }

    .header-search-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      cursor: pointer;
      border-radius: 50%;
      transition: all 0.3s ease;
    }

    .header-search-btn:hover {
      background: rgba(255,255,255,0.2);
    }

    /* Main Content */
    .main-content {
      padding-top: 56px;
      min-height: 100vh;
    }

    /* Location Bar */
    .location-bar {
      background: var(--surface);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .location-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .location-info i {
      color: var(--primary);
      font-size: 16px;
    }

    .location-info strong {
      color: var(--text-primary);
    }

    .location-switch {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--primary);
      font-size: 14px;
      cursor: pointer;
      padding: 6px 12px;
      background: rgba(255, 107, 53, 0.1);
      border-radius: 16px;
      transition: all 0.3s ease;
    }

    .location-switch:hover {
      background: rgba(255, 107, 53, 0.2);
    }

    /* Filter Bar */
    .filter-bar {
      background: var(--surface);
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filter-bar::-webkit-scrollbar {
      display: none;
    }

    .filter-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
      background: var(--bg);
      border-radius: 20px;
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s ease;
    }

    .filter-item:hover,
    .filter-item.active {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
    }

    /* Section */
    .section {
      background: var(--surface);
      margin-top: 12px;
      padding: 20px 16px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title i {
      color: var(--primary);
    }

    .section-action {
      color: var(--text-tertiary);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.3s ease;
    }

    .section-action:hover {
      color: var(--primary);
    }

    /* Hot Search */
    .hot-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .hot-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: var(--bg);
      border-radius: 20px;
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .hot-tag:hover {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      transform: translateY(-2px);
    }

    .hot-tag .rank {
      width: 18px;
      height: 18px;
      background: var(--text-tertiary);
      color: white;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
    }

    .hot-tag:nth-child(1) .rank { background: linear-gradient(135deg, #ff4757 0%, #ff6348 100%); }
    .hot-tag:nth-child(2) .rank { background: linear-gradient(135deg, #ffa502 0%, #ff7f50 100%); }
    .hot-tag:nth-child(3) .rank { background: linear-gradient(135deg, #2ed573 0%, #7bed9f 100%); }

    /* History */
    .history-list {
      display: flex;
      flex-direction: column;
    }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .history-item:last-child {
      border-bottom: none;
    }

    .history-item:hover {
      padding-left: 8px;
    }

    .history-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .history-left i {
      color: var(--text-tertiary);
      font-size: 16px;
    }

    .history-text {
      font-size: 15px;
      color: var(--text-primary);
    }

    .history-delete {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      border-radius: 50%;
      transition: all 0.3s ease;
    }

    .history-delete:hover {
      background: var(--bg);
      color: var(--primary);
    }

    /* Result List */
    .result-list {
      padding: 0 16px;
    }

    .result-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .result-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .result-card-inner {
      display: flex;
      padding: 12px;
      gap: 12px;
    }

    .result-image {
      width: 100px;
      height: 100px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      flex-shrink: 0;
    }

    .result-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .result-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-width: 0;
    }

    .result-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .result-rate {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .result-rate-text {
      color: var(--primary);
      font-weight: 600;
      font-size: 13px;
    }

    .result-comments {
      color: var(--text-tertiary);
      font-size: 12px;
    }

    .result-address {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .result-address i {
      color: var(--primary);
      font-size: 14px;
    }

    .result-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .result-price {
      color: var(--primary);
      font-weight: 700;
      font-size: 16px;
    }

    .result-price small {
      font-size: 12px;
      font-weight: 400;
    }

    .result-distance {
      display: flex;
      align-items: center;
      gap: 4px;
      background: linear-gradient(135deg, #fff5f2 0%, #ffede8 100%);
      color: var(--primary);
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }

    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      text-align: center;
    }

    .empty-icon {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #fff5f2 0%, #ffede8 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .empty-icon i {
      font-size: 48px;
      color: var(--primary-light);
    }

    .empty-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .empty-desc {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* Loading */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--text-tertiary);
    }

    .loading-state i {
      font-size: 40px;
      margin-bottom: 16px;
      animation: rotate 1s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* City Dialog */
    .city-dialog .el-dialog {
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .city-dialog .el-dialog__header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      padding: 16px 20px;
    }

    .city-dialog .el-dialog__title {
      color: white;
      font-weight: 600;
    }

    .city-dialog .el-dialog__headerbtn .el-dialog__close {
      color: white;
    }

    .city-section {
      margin-bottom: 20px;
    }

    .city-section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .city-section-title i {
      color: var(--primary);
    }

    .city-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .city-tag {
      padding: 10px 20px;
      background: var(--bg);
      border-radius: 20px;
      font-size: 14px;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .city-tag:hover,
    .city-tag.active {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
    }

    .city-tag.locate {
      background: linear-gradient(135deg, #e6f7ff 0%, #f0f9ff 100%);
      color: #1890ff;
    }

    .city-tag.locate:hover {
      background: linear-gradient(135deg, #1890ff 0%, #40a9ff 100%);
      color: white;
    }
  </style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-back-btn" @click="goBack">
      <i class="el-icon-arrow-left"></i>
    </div>
    <div class="search-input-wrapper">
      <input 
        type="text" 
        class="search-input" 
        v-model="keyword"
        placeholder="搜索店铺、美食、地点..."
        @keyup.enter="doSearch"
      >
    </div>
    <div class="header-search-btn" @click="doSearch">
      <i class="el-icon-search"></i>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Location Bar -->
    <div class="location-bar" v-if="!hasSearched">
      <div class="location-info">
        <i class="el-icon-location"></i>
        <span>当前位置：<strong>{{ currentCity.name }}</strong></span>
      </div>
      <div class="location-switch" @click="showCitySelector = true">
        <i class="el-icon-map-location"></i>
        <span>切换城市</span>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar" v-if="hasSearched">
      <div 
        class="filter-item" 
        :class="{active: type === 'all'}"
        @click="setType('all')"
      >
        <i class="el-icon-menu"></i>
        <span>全部</span>
      </div>
      <div 
        class="filter-item" 
        :class="{active: type === 'shop'}"
        @click="setType('shop')"
      >
        <i class="el-icon-shopping-bag"></i>
        <span>店铺</span>
      </div>
      <div 
        class="filter-item" 
        :class="{active: type === 'blog'}"
        @click="setType('blog')"
      >
        <i class="el-icon-document"></i>
        <span>博客</span>
      </div>
      <div 
        class="filter-item" 
        :class="{active: sortBy === 'relevance'}"
        @click="setSort('relevance')"
      >
        <i class="el-icon-s-check"></i>
        <span>相关度</span>
      </div>
      <div 
        class="filter-item" 
        :class="{active: sortBy === 'distance'}"
        @click="setSort('distance')"
      >
        <i class="el-icon-location-outline"></i>
        <span>距离</span>
      </div>
      <div 
        class="filter-item" 
        :class="{active: sortBy === 'rating'}"
        @click="setSort('rating')"
      >
        <i class="el-icon-star-off"></i>
        <span>评分</span>
      </div>
    </div>

    <!-- Search Results -->
    <template v-if="hasSearched">
      <!-- Loading -->
      <div class="loading-state" v-if="loading">
        <i class="el-icon-loading"></i>
        <span>搜索中...</span>
      </div>

      <!-- Empty -->
      <div class="empty-state" v-else-if="shops.length === 0 && blogs.length === 0">
        <div class="empty-icon">
          <i class="el-icon-search"></i>
        </div>
        <div class="empty-title">未找到相关结果</div>
        <div class="empty-desc">换个关键词试试吧</div>
      </div>

      <!-- Results -->
      <div class="result-list" v-else>
        <div class="result-card" v-for="item in filteredResults" :key="item.id" @click="openDetail(item)">
          <div class="result-card-inner">
            <div class="result-image">
              <img :src="(item.images && item.images.split(',')[0]) || '/imgs/icons/default-icon.png'" alt="">
            </div>
            <div class="result-info">
              <div>
                <div class="result-title">{{ item.name || item.title }}</div>
                <div class="result-meta" v-if="item.score">
                  <div class="result-rate">
                    <el-rate disabled v-model="item.score/10" text-color="#ff6b35"></el-rate>
                    <span class="result-rate-text">{{ item.score/10 }}</span>
                  </div>
                  <span class="result-comments">{{ item.comments || 0 }}条评价</span>
                </div>
                <div class="result-address" v-if="item.address">
                  <i class="el-icon-map-location"></i>
                  <span>{{ item.address }}</span>
                </div>
              </div>
              <div class="result-footer">
                <div class="result-price" v-if="item.avgPrice">
                  <small>￥</small>{{ item.avgPrice }}<small>/人</small>
                </div>
                <div class="result-distance" v-if="item.distance">
                  <i class="el-icon-location"></i>
                  <span>{{ formatDistance(item.distance) }}</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- Hot Search -->
    <div class="section" v-if="!hasSearched && hotSearches.length > 0">
      <div class="section-header">
        <div class="section-title">
          <i class="el-icon-fire"></i>
          热门搜索
        </div>
      </div>
      <div class="hot-tags">
        <div 
          class="hot-tag" 
          v-for="(item, index) in hotSearches" 
          :key="index"
          @click="searchByKeyword(item.keyword)"
        >
          <span class="rank">{{ index + 1 }}</span>
          <span>{{ item.keyword }}</span>
        </div>
      </div>
    </div>

    <!-- Search History -->
    <div class="section" v-if="!hasSearched && searchHistory.length > 0">
      <div class="section-header">
        <div class="section-title">
          <i class="el-icon-time"></i>
          搜索历史
        </div>
        <div class="section-action" @click="clearHistory">
          <i class="el-icon-delete"></i>
          清空
        </div>
      </div>
      <div class="history-list">
        <div class="history-item" v-for="(item, index) in searchHistory" :key="index" @click="searchByKeyword(item)">
          <div class="history-left">
            <i class="el-icon-search"></i>
            <span class="history-text">{{ item }}</span>
          </div>
          <div class="history-delete" @click.stop="removeHistoryItem(item)">
            <i class="el-icon-close"></i>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- City Selector Dialog -->
  <el-dialog
    title="选择城市"
    :visible.sync="showCitySelector"
    width="90%"
    custom-class="city-dialog"
    :modal-append-to-body="false"
    center
  >
    <div style="max-height: 400px; overflow-y: auto;">
      <!-- Locate -->
      <div class="city-section">
        <div class="city-section-title">
          <i class="el-icon-aim"></i>
          定位城市
        </div>
        <div class="city-tags">
          <span class="city-tag locate" @click="useRealLocation">
            <i class="el-icon-location-information"></i>
            重新定位
          </span>
        </div>
      </div>

      <!-- Hot Cities -->
      <div class="city-section">
        <div class="city-section-title">
          <i class="el-icon-star-on"></i>
          热门城市
        </div>
        <div class="city-tags">
          <span 
            v-for="city in hotCities" 
            :key="city.code"
            class="city-tag"
            :class="{ active: currentCity.code === city.code }"
            @click="selectCity(city)"
          >
            {{ city.name }}
          </span>
        </div>
      </div>

      <!-- All Cities -->
      <div class="city-section">
        <div class="city-section-title">
          <i class="el-icon-office-building"></i>
          更多城市
        </div>
        <div class="city-tags">
          <span 
            v-for="city in allCities" 
            :key="city.code"
            class="city-tag"
            :class="{ active: currentCity.code === city.code }"
            @click="selectCity(city)"
          >
            {{ city.name }}
          </span>
        </div>
      </div>
    </div>
  </el-dialog>
</div>

<script src="/js/vue.js"></script>
<script src="/js/axios.min.js"></script>
<script src="/js/element.js"></script>
<script src="/js/common.js"></script>
<script>
  const CITY_LIST = [
    { code: 'beijing', name: '北京', longitude: 116.4074, latitude: 39.9042, description: '北京市中心' },
    { code: 'shanghai', name: '上海', longitude: 121.4737, latitude: 31.2304, description: '上海市中心' },
    { code: 'guangzhou', name: '广州', longitude: 113.2644, latitude: 23.1291, description: '广州市中心' },
    { code: 'shenzhen', name: '深圳', longitude: 114.0579, latitude: 22.5431, description: '深圳市中心' },
    { code: 'hangzhou', name: '杭州', longitude: 120.1551, latitude: 30.2741, description: '杭州市中心' },
    { code: 'nanjing', name: '南京', longitude: 118.7969, latitude: 32.0603, description: '南京市中心' },
    { code: 'chengdu', name: '成都', longitude: 104.0668, latitude: 30.5728, description: '成都市中心' },
    { code: 'wuhan', name: '武汉', longitude: 114.3054, latitude: 30.5931, description: '武汉市中心' },
    { code: 'xian', name: '西安', longitude: 108.9398, latitude: 34.3416, description: '西安市中心' },
    { code: 'changsha', name: '长沙', longitude: 112.9388, latitude: 28.2282, description: '长沙市中心' },
    { code: 'chongqing', name: '重庆', longitude: 106.5516, latitude: 29.5630, description: '重庆市中心' },
    { code: 'suzhou', name: '苏州', longitude: 120.5853, latitude: 31.2989, description: '苏州市中心' },
    { code: 'tianjin', name: '天津', longitude: 117.2009, latitude: 39.0842, description: '天津市中心' },
    { code: 'qingdao', name: '青岛', longitude: 120.3826, latitude: 36.0671, description: '青岛市中心' },
    { code: 'xiamen', name: '厦门', longitude: 118.0894, latitude: 24.4798, description: '厦门市中心' },
    { code: 'kunming', name: '昆明', longitude: 102.8329, latitude: 24.8801, description: '昆明市中心' },
    { code: 'zhengzhou', name: '郑州', longitude: 113.6253, latitude: 34.7466, description: '郑州市中心' },
    { code: 'shenyang', name: '沈阳', longitude: 123.4315, latitude: 41.8057, description: '沈阳市中心' },
    { code: 'jinan', name: '济南', longitude: 117.1205, latitude: 36.6510, description: '济南市中心' },
    { code: 'harbin', name: '哈尔滨', longitude: 126.5340, latitude: 45.8038, description: '哈尔滨市中心' }
  ];

  new Vue({
    el: '#app',
    data: {
      keyword: '',
      type: 'all',
      sortBy: 'relevance',
      current: 1,
      shops: [],
      blogs: [],
      total: 0,
      loading: false,
      hasSearched: false,
      longitude: null,
      latitude: null,
      hotSearches: [],
      searchHistory: [],
      showCitySelector: false,
      currentCity: { code: 'locating', name: '定位中...', description: '' },
      hotCities: CITY_LIST.slice(0, 10),
      allCities: CITY_LIST.slice(10)
    },
    computed: {
      filteredResults() {
        let results = [];
        if (this.type === 'all' || this.type === 'shop') {
          results = results.concat(this.shops.map(s => ({...s, type: 'shop'})));
        }
        if (this.type === 'all' || this.type === 'blog') {
          results = results.concat(this.blogs.map(b => ({...b, type: 'blog'})));
        }
        return results;
      }
    },
    mounted() {
      this.loadHotSearches();
      this.loadSearchHistory();
      this.initLocation();
    },
    methods: {
      goBack() {
        if (this.hasSearched) {
          this.hasSearched = false;
          this.keyword = '';
        } else {
          history.back();
        }
      },
      initLocation() {
        this.getLocation();
      },
      useRealLocation() {
        this.showCitySelector = false;
        this.getLocation();
        this.$message.success('正在获取您的位置...');
      },
      selectCity(city) {
        this.currentCity = city;
        this.longitude = city.longitude;
        this.latitude = city.latitude;
        this.showCitySelector = false;
        this.$message.success(`已切换到${city.name}`);
        if (this.hasSearched && this.sortBy === 'distance') {
          this.doSearch();
        }
      },
      setType(type) {
        this.type = type;
      },
      setSort(sortBy) {
        this.sortBy = sortBy;
        if (this.hasSearched) {
          this.doSearch();
        }
      },
      doSearch() {
        if (!this.keyword.trim()) {
          this.$message.warning('请输入搜索关键词');
          return;
        }
        
        this.loading = true;
        this.hasSearched = true;
        
        const payload = {
          keyword: this.keyword,
          type: this.type,
          sortBy: this.sortBy,
          current: this.current
        };
        
        if (this.sortBy === 'distance' && this.longitude && this.latitude) {
          payload.longitude = this.longitude;
          payload.latitude = this.latitude;
        }
        
        axios.post('/search', payload)
          .then((result) => {
            this.shops = result.data?.shops || [];
            this.blogs = result.data?.blogs || [];
            this.total = result.data?.total || 0;
            this.loading = false;
            this.recordSearchHistory(this.keyword);
            this.loadSearchHistory();
          })
          .catch(err => {
            this.loading = false;
            const errorMsg = err.response?.data?.errorMsg || err.message || '搜索失败';
            this.$message.error(errorMsg);
          });
      },
      loadHotSearches() {
        axios.get('/search/hot')
          .then((result) => {
            this.hotSearches = result.data || [];
          })
          .catch(() => {});
      },
      loadSearchHistory() {
        axios.get('/search/history')
          .then((result) => {
            this.searchHistory = result.data || [];
          })
          .catch(() => {});
      },
      recordSearchHistory(keyword) {
        axios.post('/search/history?keyword=' + encodeURIComponent(keyword))
          .catch(() => {});
      },
      clearHistory() {
        this.$confirm('确定要清空搜索历史吗？', '提示', {
          confirmButtonText: '确定',
          cancelButtonText: '取消',
          type: 'warning'
        }).then(() => {
          axios.delete('/search/history')
            .then(() => {
              this.searchHistory = [];
              this.$message.success('已清空搜索历史');
            })
            .catch(() => {
              this.$message.error('清空失败');
            });
        });
      },
      removeHistoryItem(keyword) {
        const index = this.searchHistory.indexOf(keyword);
        if (index > -1) {
          this.searchHistory.splice(index, 1);
        }
      },
      searchByKeyword(keyword) {
        this.keyword = keyword;
        this.doSearch();
      },
      getLocation() {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (position) => {
              this.longitude = position.coords.longitude;
              this.latitude = position.coords.latitude;
              this.currentCity = { 
                code: 'real', 
                name: '当前位置', 
                description: '基于GPS定位'
              };
              this.$message.success('已获取您的位置');
            },
            (error) => {
              this.useDefaultLocation();
            }
          );
        } else {
          this.useDefaultLocation();
        }
      },
      useDefaultLocation() {
        const defaultCity = CITY_LIST.find(c => c.code === 'changsha');
        this.currentCity = defaultCity;
        this.longitude = defaultCity.longitude;
        this.latitude = defaultCity.latitude;
      },
      formatDistance(distance) {
        if (distance < 1000) {
          return Math.round(distance) + 'm';
        } else {
          return (distance / 1000).toFixed(1) + 'km';
        }
      },
      openDetail(item) {
        if (item.type === 'blog' || item.title) {
          location.href = 'blog-detail.html?id=' + item.id;
        } else {
          location.href = 'shop-detail.html?id=' + item.id;
        }
      }
    }
  })
</script>
</body>
</html>
