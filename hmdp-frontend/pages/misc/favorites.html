<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>我的收藏</title>
  <link rel="stylesheet" href="/css/element.css">
  <link href="/css/main.css" rel="stylesheet">
  <style>
    :root {
      --primary: #ff6b35;
      --primary-light: #ff8c61;
      --bg: #f7f8fc;
      --surface: #ffffff;
      --text-primary: #1f2937;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --shadow-sm: 0 8px 22px rgba(15, 23, 42, 0.05);
      --shadow-lg: 0 16px 40px rgba(15, 23, 42, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(255, 107, 53, 0.12), transparent 28%),
        linear-gradient(180deg, #fbfcff 0%, var(--bg) 100%);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .page-shell {
      max-width: 1080px;
      margin: 0 auto;
      padding: 18px 16px 124px;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 0 16px;
      background: linear-gradient(180deg, rgba(247, 248, 252, 0.96) 0%, rgba(247, 248, 252, 0.84) 72%, rgba(247, 248, 252, 0) 100%);
      backdrop-filter: blur(18px);
    }

    .header-back-btn,
    .header-action,
    .favorite-btn,
    .empty-btn,
    .bottom-btn {
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .header-back-btn,
    .header-action {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
      flex-shrink: 0;
    }

    .header-title {
      flex: 1;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .tab-bar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding: 6px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 22px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 18px;
    }

    .tab-item {
      border-radius: 16px;
      padding: 12px 10px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab-item.active {
      color: #fff;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      box-shadow: 0 10px 24px rgba(255, 107, 53, 0.24);
    }

    .favorite-list { display: grid; gap: 14px; }

    .favorite-card {
      display: grid;
      grid-template-columns: 132px minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 16px;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 22px;
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: transform 0.24s ease, box-shadow 0.24s ease;
    }

    .favorite-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .favorite-image {
      width: 132px;
      height: 132px;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(135deg, #fff1eb 0%, #f6f8ff 100%);
    }

    .favorite-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .favorite-info { min-width: 0; }

    .favorite-title {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
      line-height: 1.45;
    }

    .type-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .type-badge.shop {
      background: rgba(24, 144, 255, 0.12);
      color: #1890ff;
    }

    .type-badge.blog {
      background: rgba(103, 194, 58, 0.12);
      color: #52c41a;
    }

    .favorite-desc {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.75;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .favorite-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 14px;
    }

    .favorite-meta-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .favorite-meta-item i,
    .favorite-meta-item .score {
      color: var(--primary);
    }

    .favorite-btn {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      background: rgba(255, 107, 53, 0.12);
      color: var(--primary);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .loading-state,
    .empty-state,
    .load-more {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .loading-state {
      padding: 84px 20px;
      color: var(--text-muted);
      gap: 12px;
    }

    .loading-state i { font-size: 42px; }

    .empty-state {
      padding: 100px 20px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: var(--shadow-sm);
    }

    .empty-icon {
      width: 132px;
      height: 132px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fff5f2 0%, #ffede8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary-light);
      font-size: 58px;
      margin-bottom: 20px;
    }

    .empty-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .empty-desc {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 22px;
    }

    .empty-btn,
    .bottom-btn {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: #fff;
      border-radius: 999px;
      padding: 12px 22px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 12px 28px rgba(255, 107, 53, 0.24);
    }

    .load-more {
      padding: 24px 0 4px;
      color: var(--text-muted);
    }

    .bottom-bar {
      position: fixed;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      width: min(1040px, calc(100% - 24px));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 44px rgba(15, 23, 42, 0.1);
      z-index: 40;
    }

    .bottom-info {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .bottom-info span {
      color: var(--primary);
      font-weight: 700;
    }

    @media (max-width: 768px) {
      .page-shell { padding: 14px 12px 128px; }
      .header-title { font-size: 20px; }
      .favorite-card { grid-template-columns: 96px minmax(0, 1fr); }
      .favorite-image { width: 96px; height: 96px; }
      .favorite-actions { grid-column: 2; justify-self: end; }
      .favorite-title { font-size: 16px; }
      .bottom-bar { flex-direction: column; align-items: stretch; }
    }

    @media (max-width: 520px) {
      .favorite-card { grid-template-columns: 1fr; }
      .favorite-image { width: 100%; height: 196px; }
      .favorite-actions { grid-column: auto; justify-self: end; }
    }
  </style>
</head>
<body>
<div id="app">
  <div class="page-shell">
    <div class="header">
      <button class="header-back-btn" @click="goBack">
        <i class="el-icon-arrow-left"></i>
      </button>
      <div class="header-title">我的收藏</div>
      <button class="header-action" @click="goToSearch">
        <i class="el-icon-search"></i>
      </button>
    </div>

    <div class="tab-bar">
      <div class="tab-item" :class="{ active: activeType === '0' }" @click="switchTab('0')">全部</div>
      <div class="tab-item" :class="{ active: activeType === '1' }" @click="switchTab('1')">店铺</div>
      <div class="tab-item" :class="{ active: activeType === '2' }" @click="switchTab('2')">笔记</div>
    </div>

    <div class="loading-state" v-if="loading">
      <i class="el-icon-loading"></i>
      <span>正在加载收藏内容...</span>
    </div>

    <div class="empty-state" v-else-if="favorites.length === 0">
      <div class="empty-icon">
        <i class="el-icon-star-off"></i>
      </div>
      <div class="empty-title">还没有收藏内容</div>
      <div class="empty-desc">把喜欢的店铺和探店笔记收藏起来，之后回看会更方便。</div>
      <button class="empty-btn" @click="goToExplore">去首页逛逛</button>
    </div>

    <div class="favorite-list" v-else>
      <div class="favorite-card" v-for="item in favorites" :key="item.id" @click="openDetail(item)">
        <div class="favorite-image">
          <img :src="getThumb(item)" :alt="item.name || item.title || '收藏内容'" @error="handleImageError">
        </div>
        <div class="favorite-info">
          <div class="favorite-title">
            <span class="type-badge" :class="item.name ? 'shop' : 'blog'">
              <i :class="item.name ? 'el-icon-shopping-bag-2' : 'el-icon-document'"></i>
              {{ item.name ? '店铺' : '笔记' }}
            </span>
            <span>{{ item.name || item.title || '未命名内容' }}</span>
          </div>
          <div class="favorite-desc">{{ getDesc(item) }}</div>
          <div class="favorite-meta">
            <div class="favorite-meta-item" v-if="item.score">
              <i class="el-icon-star-on"></i>
              <span class="score">{{ item.score }}</span>
            </div>
            <div class="favorite-meta-item" v-if="item.avgPrice">
              <i class="el-icon-wallet"></i>
              <span>人均 ¥{{ item.avgPrice }}</span>
            </div>
            <div class="favorite-meta-item" v-if="item.liked !== undefined">
              <i class="el-icon-thumb"></i>
              <span>{{ item.liked }} 人喜欢</span>
            </div>
          </div>
        </div>
        <div class="favorite-actions">
          <button class="favorite-btn" @click.stop="cancelFavorite(item)">
            <i class="el-icon-star-on"></i>
          </button>
        </div>
      </div>

      <div class="load-more" v-if="hasMore">
        <el-button type="text" @click="loadMore" :loading="loadingMore">加载更多</el-button>
      </div>

      <div class="load-more" v-else>
        <span>已经到底了</span>
      </div>
    </div>
  </div>

  <div class="bottom-bar" v-if="favorites.length > 0 && !loading">
    <div class="bottom-info">当前共收藏 <span>{{ favorites.length }}</span> 条内容</div>
    <button class="bottom-btn" @click="goToExplore">继续发现</button>
  </div>
</div>

<script src="/js/vue.js"></script>
<script src="/js/axios.min.js"></script>
<script src="/js/element.js"></script>
<script src="/js/common.js"></script>
<script>
  new Vue({
    el: '#app',
    data: {
      activeType: '0',
      favorites: [],
      loading: true,
      loadingMore: false,
      current: 1,
      hasMore: true,
      fallbackImage: '/imgs/blogs/blog1.jpg'
    },
    created() {
      this.loadFavorites();
    },
    methods: {
      goBack() {
        history.back();
      },
      goToSearch() {
        location.href = '/pages/misc/search.html';
      },
      goToExplore() {
        location.href = '/pages/index-new.html';
      },
      switchTab(type) {
        if (this.activeType === type) return;
        this.activeType = type;
        this.current = 1;
        this.favorites = [];
        this.hasMore = true;
        this.loadFavorites();
      },
      loadFavorites() {
        this.loading = this.current === 1;
        const type = this.activeType === '0' ? null : Number(this.activeType);
        axios.get('/favorites/list', {
          params: { type: type, current: this.current }
        }).then(({ data }) => {
          const list = data?.data || data;
          const rows = Array.isArray(list) ? list : [];
          if (this.current === 1) {
            this.favorites = rows;
          } else {
            this.favorites = this.favorites.concat(rows);
          }
          this.hasMore = rows.length === 10;
        }).catch((err) => {
          this.$message.error(this.getErrorMessage(err, '加载收藏失败'));
        }).finally(() => {
          this.loading = false;
          this.loadingMore = false;
        });
      },
      loadMore() {
        if (this.loadingMore || !this.hasMore) return;
        this.current += 1;
        this.loadingMore = true;
        this.loadFavorites();
      },
      normalizeImagePath(path) {
        if (!path) return '';
        const value = String(path).trim().replace(/^['"]+|['"]+$/g, '');
        if (value.startsWith('http') || value.startsWith('data:')) return value;
        if (value.startsWith(util.commonURL)) return value;
        if (value.startsWith('/blogs/')) return '/imgs' + value;
        if (value.startsWith('blogs/')) return '/imgs/' + value;
        if (value.startsWith('/icons/')) return '/imgs' + value;
        if (value.startsWith('icons/')) return '/imgs/' + value;
        return value.startsWith('/') ? value : '/' + value;
      },
      resolveImageUrl(path) {
        const normalized = this.normalizeImagePath(path);
        if (!normalized) return this.fallbackImage;
        if (normalized.startsWith('http') || normalized.startsWith('data:')) return normalized;
        return util.commonURL + normalized;
      },
      getThumb(item) {
        const first = item?.images ? String(item.images).split(',')[0] : '';
        return this.resolveImageUrl(first);
      },
      handleImageError(event) {
        if (!event || !event.target) return;
        if (event.target.dataset.fallbackApplied === '1') return;
        event.target.dataset.fallbackApplied = '1';
        event.target.src = this.fallbackImage;
      },
      getDesc(item) {
        if (item?.address) return item.address;
        if (item?.content) {
          const content = String(item.content).replace(/<[^>]+>/g, '').trim();
          return content ? content.slice(0, 64) : '暂无内容简介';
        }
        return '暂无内容简介';
      },
      openDetail(item) {
        if (item?.name) {
          location.href = '/pages/shop/shop-detail.html?id=' + item.id;
          return;
        }
        if (item?.title) {
          location.href = '/pages/blog/blog-detail.html?id=' + item.id;
        }
      },
      cancelFavorite(item) {
        const type = item?.name ? 1 : 2;
        this.$confirm('确定取消这条收藏吗？', '提示', {
          confirmButtonText: '取消收藏',
          cancelButtonText: '再想想',
          type: 'warning'
        }).then(() => {
          return axios.delete('/favorites/' + type + '/' + item.id);
        }).then(() => {
          this.$message.success('已取消收藏');
          this.favorites = this.favorites.filter((row) => row.id !== item.id);
        }).catch((err) => {
          if (err !== 'cancel') {
            this.$message.error(this.getErrorMessage(err, '取消收藏失败'));
          }
        });
      },
      getErrorMessage(err, fallback) {
        if (typeof err === 'string') return err;
        return err?.response?.data?.errorMsg || err?.message || fallback;
      }
    }
  });
</script>
</body>
</html>
