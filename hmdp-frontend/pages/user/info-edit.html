<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>编辑资料</title>
  <link rel="stylesheet" href="/css/element.css">
  <link href="/css/main.css" rel="stylesheet">
  <link href="/css/info.css" rel="stylesheet">
  <style>
    .edit-dialog .el-dialog__body {
      padding: 20px;
    }
    .avatar-uploader {
      text-align: center;
      padding: 20px;
    }
    .avatar-preview {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin-bottom: 15px;
    }
    .upload-tip {
      color: #999;
      font-size: 12px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-back-btn" @click="goBack"><i class="el-icon-arrow-left"></i></div>
    <div class="header-title">资料编辑&nbsp;&nbsp;&nbsp;</div>
  </div>
  <div class="edit-container">
    <div class="info-box">
      <div class="info-item" @click="showAvatarDialog = true">
        <div class="info-label">头像</div>
        <div class="info-btn">
          <img width="35" height="35" style="border-radius: 50%; object-fit: cover;" :src="getImageUrl(user.icon)" alt="">
          <div><i class="el-icon-arrow-right"></i></div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="info-item" @click="showNickNameDialog = true">
        <div class="info-label">昵称</div>
        <div class="info-btn">
          <div>{{user.nickName}}</div>
          <div><i class="el-icon-arrow-right"></i></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 头像编辑对话框 -->
  <el-dialog title="修改头像" :visible.sync="showAvatarDialog" width="80%">
    <div class="avatar-uploader">
      <img :src="tempAvatar || user.icon || '/imgs/icons/default-icon.png'" class="avatar-preview" alt="" @click="triggerFileInput">
      <input type="file" ref="fileInput" style="display: none;" accept="image/*" @change="handleFileChange">
      <el-button type="primary" icon="el-icon-upload" @click="triggerFileInput">选择图片</el-button>
      <div class="upload-tip">支持 jpg、png、gif 格式，文件不超过 5MB</div>
    </div>
    <span slot="footer">
      <el-button @click="showAvatarDialog = false">取消</el-button>
      <el-button type="primary" @click="saveAvatar" :loading="uploading">保存</el-button>
    </span>
  </el-dialog>

  <!-- 昵称编辑对话框 -->
  <el-dialog title="修改昵称" :visible.sync="showNickNameDialog" width="80%">
    <el-input v-model="tempNickName" placeholder="请输入昵称" maxlength="20" show-word-limit></el-input>
    <span slot="footer">
      <el-button @click="showNickNameDialog = false">取消</el-button>
      <el-button type="primary" @click="saveNickName">保存</el-button>
    </span>
  </el-dialog>
</div>
<script src="/js/vue.js"></script>
<script src="/js/axios.min.js"></script>
<script src="/js/element.js"></script>
<script src="/js/common.js"></script>
<script>
  const app = new Vue({
    el: "#app",
    data: {
      user: {},
      showAvatarDialog: false,
      showNickNameDialog: false,
      tempAvatar: '',
      tempNickName: '',
      selectedFile: null,
      uploading: false,
    },
    created() {
      this.checkLogin();
    },
    methods: {
      checkLogin() {
        axios.get("/user/me")
          .then(({data}) => {
            this.user = data;
            this.tempNickName = data.nickName || '';
            this.tempAvatar = data.icon || '';
          })
          .catch(err => {
            this.$message.error('请先登录');
            setTimeout(() => location.href = "../auth/login.html", 1000);
          });
      },
      goBack() {
        history.back();
      },
      triggerFileInput() {
        this.$refs.fileInput.click();
      },
      handleFileChange(e) {
        const file = e.target.files[0];
        if (!file) return;

        // 验证文件类型
        const validTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/jpg'];
        if (!validTypes.includes(file.type)) {
          this.$message.error('请上传 jpg、png 或 gif 格式的图片');
          return;
        }

        // 验证文件大小 (5MB)
        const maxSize = 5 * 1024 * 1024;
        if (file.size > maxSize) {
          this.$message.error('图片大小不能超过 5MB');
          return;
        }

        this.selectedFile = file;

        // 预览图片
        const reader = new FileReader();
        reader.onload = (e) => {
          this.tempAvatar = e.target.result;
        };
        reader.readAsDataURL(file);
      },
      saveAvatar() {
        if (!this.selectedFile && !this.tempAvatar) {
          this.$message.error('请选择图片');
          return;
        }

        // 如果没有选择新文件，只是用原来的头像，直接关闭
        if (!this.selectedFile) {
          this.showAvatarDialog = false;
          return;
        }

        this.uploading = true;
        
        // 先上传文件到服务器获取 URL
        const formData = new FormData();
        formData.append('file', this.selectedFile);
        
        axios.post('/upload/blog', formData, {
          headers: {
            'Content-Type': 'multipart/form-data'
          }
        })
          .then((uploadResult) => {
            // 上传成功后，调用 upload-icon 接口更新用户头像
            if (uploadResult && uploadResult.success) {
              const imageUrl = uploadResult.data;
              return axios.post('/user/upload-icon?url=' + encodeURIComponent(imageUrl));
            } else {
              throw new Error(uploadResult?.errorMsg || '文件上传失败');
            }
          })
          .then((updateResult) => {
            // common.js 拦截器已经处理了 response，这里直接拿到 Result 对象
            if (updateResult && updateResult.success) {
              this.user.icon = updateResult.data;
              this.tempAvatar = this.user.icon;
              // 保存到本地存储，确保返回个人主页时能立即看到更新
              localStorage.setItem('userIcon', this.user.icon);
              this.$message.success('头像修改成功');
              this.showAvatarDialog = false;
              this.selectedFile = null;
              // 清除文件输入，允许再次选择同一文件
              this.$refs.fileInput.value = '';
            } else {
              this.$message.error(updateResult?.errorMsg || '修改失败');
            }
          })
          .catch(err => {
            this.$message.error(err?.response?.data?.errorMsg || err?.message || '修改失败');
          })
          .finally(() => {
            this.uploading = false;
          });
      },
      saveNickName() {
        if (!this.tempNickName.trim()) {
          this.$message.error('请输入昵称');
          return;
        }
        const updateData = {
          id: this.user.id,
          nickName: this.tempNickName.trim()
        };
        axios.put('/user/update', updateData)
          .then(() => {
            this.user.nickName = this.tempNickName.trim();
            // 保存到本地存储，确保返回个人主页时能立即看到更新
            localStorage.setItem('userNickName', this.tempNickName.trim());
            this.$message.success('昵称修改成功');
            this.showNickNameDialog = false;
          })
          .catch(err => {
            this.$message.error(err?.response?.data?.errorMsg || err?.message || '修改失败');
          });
      },
      getImageUrl(icon) {
        if (!icon) {
          return '/imgs/icons/default-icon.png';
        }
        // 如果已经是完整URL，直接返回
        if (icon.startsWith('http')) {
          return icon;
        }
        // 拼接完整URL，添加 /imgs 前缀
        return util.commonURL + '/imgs' + icon;
      }
    }
  });
</script>
</body>
</html>
