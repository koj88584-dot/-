<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>编辑资料</title>
  <link rel="stylesheet" href="/css/element.css">
  <link href="/css/main.css" rel="stylesheet">
  <link href="/css/info.css" rel="stylesheet">
  <style>
    .edit-dialog .el-dialog__body {
      padding: 20px;
    }
    .avatar-uploader {
      text-align: center;
      padding: 20px;
    }
    .avatar-preview {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin-bottom: 15px;
    }
    .upload-tip {
      color: #999;
      font-size: 12px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-back-btn" @click="goBack"><i class="el-icon-arrow-left"></i></div>
    <div class="header-title">资料编辑&nbsp;&nbsp;&nbsp;</div>
  </div>
  <div class="edit-container">
    <div class="info-box">
      <div class="info-item" @click="showAvatarDialog = true">
        <div class="info-label">头像</div>
        <div class="info-btn">
          <img width="35" height="35" style="border-radius: 50%; object-fit: cover;" :src="getImageUrl(user.icon)" alt="">
          <div><i class="el-icon-arrow-right"></i></div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="info-item" @click="showNickNameDialog = true">
        <div class="info-label">昵称</div>
        <div class="info-btn">
          <div>{{user.nickName}}</div>
          <div><i class="el-icon-arrow-right"></i></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 头像编辑对话框 -->
  <el-dialog title="修改头像" :visible.sync="showAvatarDialog" width="80%">
    <div class="avatar-uploader">
      <img :src="getImageUrl(tempAvatar || user.icon)" class="avatar-preview" alt="" @click="triggerFileInput">
      <input type="file" ref="fileInput" style="display: none;" accept="image/*" @change="handleFileChange">
      <el-button type="primary" icon="el-icon-upload" @click="triggerFileInput">从手机相册选择</el-button>
      <div class="upload-tip">支持 jpg、png、gif、webp 格式，文件不超过 5MB</div>
    </div>
    <span slot="footer">
      <el-button @click="showAvatarDialog = false">取消</el-button>
      <el-button type="primary" @click="saveAvatar" :loading="uploading">保存</el-button>
    </span>
  </el-dialog>

  <!-- 昵称编辑对话框 -->
  <el-dialog title="修改昵称" :visible.sync="showNickNameDialog" width="80%">
    <el-input v-model="tempNickName" placeholder="请输入昵称" maxlength="20" show-word-limit></el-input>
    <span slot="footer">
      <el-button @click="showNickNameDialog = false">取消</el-button>
      <el-button type="primary" @click="saveNickName">保存</el-button>
    </span>
  </el-dialog>
</div>
<script src="/js/vue.js"></script>
<script src="/js/axios.min.js"></script>
<script src="/js/element.js"></script>
<script src="/js/common.js"></script>
<script src="/js/user-info-edit-page.js"></script>
</body>
</html>
