<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>用户主页 - 周边优速通</title>
  <link rel="stylesheet" href="/css/element.css">
  <link href="/css/main.css" rel="stylesheet">
  <style>
    :root {
      --primary: #FF7A45;
      --primary-light: #FF9C6E;
      --bg: #FDFBF9;
      --surface: #FFFFFF;
      --text-primary: #3A3432;
      --text-secondary: #8A817C;
      --text-muted: #B5AFA6;
      --shadow-sm: 0 4px 12px rgba(255,122,69,0.04);
      --shadow-md: 0 8px 24px rgba(255,122,69,0.08);
      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-xl: 32px;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: var(--bg); color: var(--text-primary);
      -webkit-font-smoothing: antialiased; min-height: 100vh;
    }
    #app {
      width: min(100%, 390px); min-height: 100vh;
      margin: 0 auto; position: relative; padding-bottom: 104px;
    }
    [v-cloak] { display: none !important; }

    /* Header overlay */
    .page-header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 100;
      padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
      color: #fff;
    }
    .header-btn {
      width: 40px; height: 40px; border: none; border-radius: 50%;
      background: rgba(255,255,255,0.15); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer; backdrop-filter: blur(10px);
      transition: all 0.2s;
    }
    .header-btn:active { transform: scale(0.92); }

    /* Profile Hero Card */
    .profile-hero {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      padding: 72px 20px 48px; color: #fff; position: relative; overflow: hidden;
      border-radius: 0 0 var(--radius-xl) var(--radius-xl);
      box-shadow: var(--shadow-md);
    }
    .profile-hero::before {
      content: ''; position: absolute; top: -50%; right: -20%;
      width: 300px; height: 300px; background: rgba(255,255,255,0.08); border-radius: 50%;
    }
    .profile-hero::after {
      content: ''; position: absolute; bottom: -30%; left: -10%;
      width: 200px; height: 200px; background: rgba(255,255,255,0.05); border-radius: 50%;
    }
    .profile-main {
      display: flex; align-items: center; gap: 16px; position: relative; z-index: 1;
    }
    .avatar {
      width: 80px; height: 80px; border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.3); object-fit: cover;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2); background: rgba(255,255,255,0.1);
    }
    .profile-info { flex: 1; }
    .profile-name {
      font-size: 22px; font-weight: 700; margin-bottom: 4px;
      display: flex; align-items: center; gap: 8px;
    }
    .profile-location {
      font-size: 14px; opacity: 0.9; display: flex; align-items: center; gap: 4px;
    }
    .profile-bio {
      margin-top: 12px; font-size: 13px; opacity: 0.85; line-height: 1.5;
      padding: 8px 12px; background: rgba(255,255,255,0.1);
      border-radius: var(--radius-md); position: relative; z-index: 1;
    }

    /* Action buttons row */
    .action-row {
      display: flex; gap: 10px; margin: -24px 16px 0; position: relative; z-index: 10;
    }
    .action-btn {
      flex: 1; border: none; border-radius: var(--radius-md);
      padding: 14px 0; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; display: flex;
      align-items: center; justify-content: center; gap: 6px;
      box-shadow: var(--shadow-md);
    }
    .action-btn:active { transform: scale(0.97); }
    .action-btn.primary {
      background: var(--primary); color: #fff;
    }
    .action-btn.primary.followed {
      background: var(--surface); color: var(--text-secondary);
      border: 1px solid rgba(0,0,0,0.08);
    }
    .action-btn.secondary {
      background: var(--surface); color: var(--text-primary);
      border: 1px solid rgba(0,0,0,0.06);
    }

    /* Stats bar */
    .stats-bar {
      display: flex; justify-content: space-around;
      padding: 20px 16px; margin: 12px 16px 0;
      background: var(--surface); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }
    .stat-item { text-align: center; cursor: pointer; padding: 4px 12px; }
    .stat-num { font-size: 22px; font-weight: 700; color: var(--text-primary); }
    .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; font-weight: 500; }

    /* Content tabs */
    .content-section {
      margin: 12px 16px 0; background: var(--surface);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden;
    }
    .content-tabs {
      display: flex; border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .tab-item {
      flex: 1; padding: 14px; text-align: center; font-size: 14px;
      color: var(--text-secondary); cursor: pointer; position: relative;
      font-weight: 600; transition: all 0.2s; border: none; background: none;
    }
    .tab-item.active { color: var(--primary); }
    .tab-item.active::after {
      content: ''; position: absolute; bottom: 0; left: 25%; right: 25%;
      height: 3px; background: var(--primary); border-radius: 2px;
    }
    .tab-content { padding: 16px; min-height: 180px; }

    /* Blog list */
    .blog-list { display: flex; flex-direction: column; gap: 12px; }
    .blog-card {
      display: flex; gap: 12px; padding: 12px; background: var(--bg);
      border-radius: var(--radius-md); cursor: pointer; transition: all 0.2s;
      border: 1px solid transparent;
    }
    .blog-card:active { transform: scale(0.98); }
    .blog-thumb {
      width: 90px; height: 90px; border-radius: var(--radius-sm);
      overflow: hidden; flex-shrink: 0; background: #f0ece8;
    }
    .blog-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .blog-body { flex:1; display:flex; flex-direction:column; justify-content:space-between; min-width:0; }
    .blog-title {
      font-size: 15px; font-weight: 600; color: var(--text-primary);
      line-height: 1.4; overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .blog-meta { display:flex; align-items:center; gap:14px; margin-top:6px; }
    .blog-stat {
      display:flex; align-items:center; gap:4px;
      font-size:12px; color:var(--text-muted); font-weight:500;
    }
    .blog-stat i { font-size:14px; }
    .blog-stat.liked i { color:#ff6b6b; }

    /* Common follows */
    .follow-list { display: flex; flex-direction: column; gap: 12px; }
    .follow-card {
      display: flex; align-items: center; gap: 12px; padding: 10px;
      background: var(--bg); border-radius: var(--radius-md);
      cursor: pointer; transition: all 0.2s;
    }
    .follow-card:active { transform: scale(0.98); }
    .follow-avatar {
      width: 48px; height: 48px; border-radius: 50%; object-fit: cover;
      border: 2px solid rgba(255,122,69,0.15); flex-shrink: 0; background: #f0ece8;
    }
    .follow-name { flex: 1; font-size: 14px; font-weight: 600; }
    .follow-go-btn {
      border: 1px solid rgba(255,122,69,0.3); background: none;
      color: var(--primary); padding: 6px 14px; border-radius: 20px;
      font-size: 12px; font-weight: 600; cursor: pointer;
    }

    /* Mutual badge */
    .mutual-badge {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 11px; color: #059669; background: rgba(5,150,105,0.08);
      padding: 2px 8px; border-radius: 10px; font-weight: 600;
    }

    /* Empty */
    .empty-state {
      text-align: center; padding: 48px 20px; color: var(--text-muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
    .empty-text { font-size: 13px; }

    /* Visit toast */
    .visit-toast {
      position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: #fff; padding: 8px 16px;
      border-radius: 20px; font-size: 12px; z-index: 200;
      backdrop-filter: blur(10px); animation: toastIn 0.3s ease-out;
      display: flex; align-items: center; gap: 6px;
    }
    @keyframes toastIn {
      from { opacity:0; transform: translateX(-50%) translateY(-10px); }
      to { opacity:1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>
<div id="app" v-cloak>
  <!-- Header overlay -->
  <header class="page-header">
    <button class="header-btn" @click="goBack"><i class="el-icon-arrow-left"></i></button>
    <button class="header-btn" @click="sharePage"><i class="el-icon-share"></i></button>
  </header>

  <!-- Profile Hero -->
  <div class="profile-hero">
    <div class="profile-main">
      <img class="avatar" :src="getAvatar(user.icon)" alt="" @error="handleAvatarError($event)">
      <div class="profile-info">
        <div class="profile-name">
          {{ user.nickName || '用户' }}
          <span v-if="isMutual" class="mutual-badge"><i class="el-icon-sort"></i> 互相关注</span>
        </div>
        <div class="profile-location">
          <i class="el-icon-location-outline"></i>
          <span>{{ user.city || '未知城市' }}</span>
        </div>
      </div>
    </div>
    <div class="profile-bio">
      <span v-if="info.introduce">{{ info.introduce }}</span>
      <span v-else style="opacity:0.6">这个人很懒，什么都没有留下</span>
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="action-row">
    <button class="action-btn" :class="followed ? 'primary followed' : 'primary'" @click="toggleFollow">
      <i :class="followed ? 'el-icon-check' : 'el-icon-plus'"></i>
      {{ followed ? (isMutual ? '互相关注' : '已关注') : '关注' }}
    </button>
    <button class="action-btn secondary" @click="sendMessage">
      <i class="el-icon-chat-dot-round"></i> 发消息
    </button>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-item" @click="viewFollowList('follow')">
      <div class="stat-num">{{ followCount }}</div>
      <div class="stat-label">关注</div>
    </div>
    <div class="stat-item" @click="viewFollowList('follower')">
      <div class="stat-num">{{ followerCount }}</div>
      <div class="stat-label">粉丝</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">{{ blogs.length }}</div>
      <div class="stat-label">笔记</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">{{ totalLikes }}</div>
      <div class="stat-label">获赞</div>
    </div>
  </div>

  <!-- Content Section -->
  <div class="content-section">
    <div class="content-tabs">
      <button class="tab-item" :class="{ active: activeTab === 'blogs' }" @click="activeTab = 'blogs'">笔记</button>
      <button class="tab-item" :class="{ active: activeTab === 'common' }" @click="switchToCommon">共同关注</button>
    </div>

    <!-- Blogs Tab -->
    <div class="tab-content" v-if="activeTab === 'blogs'">
      <div class="blog-list" v-if="blogs.length">
        <div class="blog-card" v-for="b in blogs" :key="b.id" @click="openBlog(b.id)">
          <div class="blog-thumb">
            <img :src="resolveImg(b.images)" alt="" @error="handleImgError($event)">
          </div>
          <div class="blog-body">
            <div class="blog-title">{{ b.title || '未命名笔记' }}</div>
            <div class="blog-meta">
              <div class="blog-stat liked"><i class="el-icon-star-on"></i> {{ b.liked || 0 }}</div>
              <div class="blog-stat"><i class="el-icon-chat-dot-round"></i> {{ b.comments || 0 }}</div>
            </div>
          </div>
        </div>
      </div>
      <div v-else class="empty-state">
        <div class="empty-icon"><i class="el-icon-document"></i></div>
        <div class="empty-text">还没有发布笔记</div>
      </div>
    </div>

    <!-- Common Follows Tab -->
    <div class="tab-content" v-if="activeTab === 'common'">
      <div class="follow-list" v-if="commonFollows.length">
        <div class="follow-card" v-for="u in commonFollows" :key="u.id" @click="toOtherInfo(u.id)">
          <img class="follow-avatar" :src="getAvatar(u.icon)" alt="" @error="handleAvatarError($event)">
          <div class="follow-name">{{ u.nickName || '用户' }}</div>
          <button class="follow-go-btn" @click.stop="toOtherInfo(u.id)">查看主页</button>
        </div>
      </div>
      <div v-else class="empty-state">
        <div class="empty-icon"><i class="el-icon-user"></i></div>
        <div class="empty-text">暂无共同关注</div>
      </div>
    </div>
  </div>

  <!-- Visit toast -->
  <div v-if="showVisitToast" class="visit-toast">
    <i class="el-icon-view"></i> 已记录访问足迹
  </div>

  <foot-bar :active-btn="0"></foot-bar>
</div>

<script src="/js/vue.js"></script>
<script src="/js/axios.min.js"></script>
<script src="/js/element.js"></script>
<script src="/js/common.js"></script>
<script src="/js/footer.js"></script>
<script src="/js/other-info-page.js"></script>
</body>
</html>
