<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>验证码登录</title>
  <link rel="stylesheet" href="/css/element.css">
  <link href="/css/main.css" rel="stylesheet">
  <link href="/css/login.css" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      overflow-x: hidden;
      background: linear-gradient(180deg, #fff6f1 0%, #fff 35%, #f7f8fa 100%);
    }

    #app {
      width: calc(100vw - 8px);
      max-width: 390px;
      min-height: 100%;
      margin: 0 auto;
      overflow-x: hidden;
    }

    .login-container {
      width: 100%;
      max-width: 100%;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .header {
      width: 100%;
      max-width: 100%;
      height: 62px;
      padding: 14px 18px 0;
      border-bottom: none;
      background: transparent;
    }

    .header-back-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ff6633;
      font-size: 22px;
      border-radius: 999px;
    }

    .header-title {
      flex: 1;
      min-width: 0;
      color: #1f2937;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      padding: 14px 16px 24px;
      background: transparent;
      justify-content: flex-start;
      gap: 20px;
    }

    .auth-panel {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      padding: 28px 22px 24px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 18px 45px rgba(255, 102, 51, 0.12);
    }

    .auth-title {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
      color: #1f2937;
    }

    .auth-desc {
      margin: 0 0 20px;
      font-size: 14px;
      line-height: 1.7;
      color: #667085;
    }

    .field-gap {
      height: 12px;
    }

    .code-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 112px;
      gap: 12px;
      align-items: center;
      width: 100%;
    }

    .code-row .el-input {
      min-width: 0;
    }

    .auth-panel .el-input__inner,
    .auth-panel .el-button {
      height: 40px;
      border-radius: 12px;
      font-size: 14px;
    }

    .auth-panel .el-input__inner {
      border: 1px solid #f0f0f0;
      box-shadow: none;
      color: #1f2937;
    }

    .auth-panel .el-input__inner::placeholder {
      color: #98a2b3;
    }

    .code-btn {
      justify-self: end;
      width: 112px;
      min-width: 112px;
      padding: 0 8px;
      border: none;
      background: linear-gradient(135deg, #ff7a45 0%, #ff5a36 100%);
      color: #fff;
      box-shadow: 0 8px 18px rgba(255, 102, 51, 0.25);
      white-space: nowrap;
    }

    .submit-btn {
      width: 100%;
      border: none;
      background: linear-gradient(135deg, #ff7a45 0%, #ff5a36 100%);
      color: #fff;
      height: 44px;
      font-size: 16px;
      font-weight: 600;
      box-shadow: 0 12px 28px rgba(255, 102, 51, 0.24);
    }

    .switch-links {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
      font-size: 14px;
    }

    .switch-links a {
      flex: 1;
      color: #ff6633;
      text-decoration: none;
      white-space: nowrap;
    }

    .switch-links a:first-child {
      text-align: left;
    }

    .switch-links a:last-child {
      text-align: right;
    }

    .agreement {
      width: 100%;
      margin: 0 auto;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 0 4px;
      color: #667085;
      font-size: 13px;
      line-height: 1.7;
    }

    .agreement a {
      color: #ff6633;
      text-decoration: none;
    }

    .agreement-check {
      position: relative;
      flex: 0 0 18px;
      width: 18px;
      height: 18px;
      margin-top: 2px;
      cursor: pointer;
    }

    .agreement input[type="radio"] {
      position: absolute;
      inset: 0;
      margin: 0;
      opacity: 0;
      cursor: pointer;
      z-index: 2;
    }

    .agreement-indicator {
      display: block;
      width: 18px;
      height: 18px;
      border: 2px solid #ff6633;
      border-radius: 50%;
      background: #fff;
    }

    .agreement input[type="radio"]:checked + .agreement-indicator::after {
      content: "";
      display: block;
      width: 8px;
      height: 8px;
      margin: 3px;
      border-radius: 50%;
      background: #ff6633;
    }

    .agreement-text {
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }

    @media (max-width: 430px) {
      #app {
        width: 88vw;
        max-width: 320px;
      }

      .header {
        padding-left: 12px;
        padding-right: 12px;
      }

      .content {
        padding-left: 10px;
        padding-right: 10px;
      }

      .auth-panel {
        padding: 20px 12px 18px;
      }

      .code-btn {
        width: 96px;
        min-width: 96px;
        font-size: 12px;
      }

      .code-row {
        grid-template-columns: minmax(0, 1fr) 96px;
      }
    }

    @media (max-width: 375px) {
      .content {
        padding-left: 14px;
        padding-right: 14px;
      }

      .auth-panel {
        padding: 24px 18px 22px;
      }

      .code-row {
        gap: 10px;
      }

      .code-btn {
        width: 96px;
        min-width: 96px;
        font-size: 12px;
      }

      .code-row {
        grid-template-columns: minmax(0, 1fr) 96px;
      }
    }

    @media (max-width: 340px) {
      .content {
        padding-left: 12px;
        padding-right: 12px;
      }

      .auth-panel {
        padding: 22px 16px 20px;
        border-radius: 20px;
      }

      .auth-title {
        font-size: 24px;
      }

      .auth-desc {
        font-size: 13px;
      }

      .agreement {
        gap: 8px;
        padding: 0 2px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
<div id="app">
  <div class="login-container">
    <div class="header">
      <div class="header-back-btn" @click="goBack"><i class="el-icon-arrow-left"></i></div>
      <div class="header-title">验证码登录</div>
    </div>
    <div class="content">
      <div class="auth-panel">
        <h1 class="auth-title">欢迎回来</h1>
        <p class="auth-desc">输入手机号和验证码即可登录，未注册手机号会在验证码校验通过后自动创建账号。</p>
        <div class="code-row">
          <el-input v-model.trim="form.phone" placeholder="请输入手机号"></el-input>
          <el-button class="code-btn" :disabled="disabled || !radio" @click="sendCode">
            {{ codeBtnMsg }}
          </el-button>
        </div>
        <div class="field-gap"></div>
        <el-input v-model.trim="form.code" placeholder="请输入短信验证码"></el-input>
        <div class="field-gap"></div>
        <el-button class="submit-btn" @click="login">登录</el-button>
        <div class="switch-links">
          <a :href="registerUrl">注册账号</a>
          <a :href="passwordLoginUrl">密码登录</a>
        </div>
      </div>

      <div class="agreement">
        <label class="agreement-check" for="agree-login">
          <input type="radio" id="agree-login" name="agree-login" v-model="radio" value="1">
          <span class="agreement-indicator"></span>
        </label>
        <div class="agreement-text">
          我已阅读并同意
          <a href="javascript:void(0)">《用户服务协议》</a>
          和
          <a href="javascript:void(0)">《隐私政策》</a>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/js/vue.js"></script>
<script src="/js/axios.min.js"></script>
<script src="/js/element.js"></script>
<script src="/js/common.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/login-page.js"></script>
</body>
</html>
