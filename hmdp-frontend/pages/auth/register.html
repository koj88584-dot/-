<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>注册账号</title>
  <link rel="stylesheet" href="/css/element.css">
  <link href="/css/main.css" rel="stylesheet">
  <link href="/css/login.css" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: linear-gradient(180deg, #fff6f1 0%, #fff 35%, #f7f8fa 100%);
    }

    .login-container {
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    .content {
      flex: 1;
      padding: 24px 18px 20px;
      background: transparent;
      justify-content: flex-start;
      gap: 16px;
    }

    .auth-panel {
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
      padding: 28px 22px 24px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 18px 45px rgba(255, 102, 51, 0.12);
    }

    .auth-title {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
      color: #1f2937;
    }

    .auth-desc {
      margin: 0 0 20px;
      font-size: 14px;
      line-height: 1.7;
      color: #667085;
    }

    .field-gap {
      height: 12px;
    }

    .code-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .code-row .el-input {
      flex: 1;
    }

    .code-btn,
    .submit-btn {
      border: none;
      background: linear-gradient(135deg, #ff7a45 0%, #ff5a36 100%);
      color: #fff;
    }

    .code-btn {
      width: 128px;
      box-shadow: 0 8px 18px rgba(255, 102, 51, 0.25);
    }

    .submit-btn {
      width: 100%;
      font-size: 16px;
      font-weight: 600;
      box-shadow: 0 12px 28px rgba(255, 102, 51, 0.24);
    }

    .switch-links {
      display: flex;
      justify-content: space-between;
      margin-top: 14px;
      font-size: 14px;
    }

    .switch-links a,
    .agreement a {
      color: #ff6633;
      text-decoration: none;
    }

    .agreement {
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 0 6px;
      color: #667085;
      font-size: 13px;
      line-height: 1.8;
    }

    .agreement input[type="radio"] {
      margin-top: 3px;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="login-container">
    <div class="header">
      <div class="header-back-btn" @click="goBack"><i class="el-icon-arrow-left"></i></div>
      <div class="header-title">注册账号</div>
    </div>
    <div class="content">
      <div class="auth-panel">
        <h1 class="auth-title">创建你的账号</h1>
        <p class="auth-desc">注册完成后会自动登录，并回到你刚才准备访问的页面。</p>
        <el-input v-model.trim="form.phone" placeholder="请输入手机号"></el-input>
        <div class="field-gap"></div>
        <div class="code-row">
          <el-input v-model.trim="form.code" placeholder="请输入短信验证码"></el-input>
          <el-button class="code-btn" :disabled="disabled || !radio" @click="sendCode">
            {{ codeBtnMsg }}
          </el-button>
        </div>
        <div class="field-gap"></div>
        <el-input v-model.trim="form.nickName" placeholder="请输入昵称（可选）"></el-input>
        <div class="field-gap"></div>
        <el-input v-model.trim="form.password" placeholder="请输入密码（至少 6 位）" show-password></el-input>
        <div class="field-gap"></div>
        <el-input v-model.trim="form.confirmPassword" placeholder="请再次输入密码" show-password></el-input>
        <div class="field-gap"></div>
        <el-button class="submit-btn" @click="register">注册并登录</el-button>
        <div class="switch-links">
          <a :href="codeLoginUrl">验证码登录</a>
          <a :href="passwordLoginUrl">密码登录</a>
        </div>
      </div>

      <div class="agreement">
        <div>
          <input type="radio" id="agree-register" name="agree-register" v-model="radio" value="1">
          <label for="agree-register"></label>
        </div>
        <div>
          我已阅读并同意
          <a href="javascript:void(0)">《用户服务协议》</a>
          和
          <a href="javascript:void(0)">《隐私政策》</a>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/js/vue.js"></script>
<script src="/js/axios.min.js"></script>
<script src="/js/element.js"></script>
<script src="/js/common.js"></script>
<script src="/js/auth.js"></script>
<script>
  new Vue({
    el: "#app",
    data: {
      radio: "",
      disabled: false,
      codeBtnMsg: "发送验证码",
      countdownTimer: null,
      redirectTarget: window.authHelper.normalizeRedirectPath(util.getUrlParam("redirect") || "/pages/index-new.html"),
      form: {
        phone: "",
        code: "",
        nickName: "",
        password: "",
        confirmPassword: ""
      }
    },
    computed: {
      codeLoginUrl() {
        return "/pages/auth/login.html?redirect=" + encodeURIComponent(this.redirectTarget);
      },
      passwordLoginUrl() {
        return "/pages/auth/login2.html?redirect=" + encodeURIComponent(this.redirectTarget);
      }
    },
    async mounted() {
      await window.authHelper.redirectIfLoggedIn(this.redirectTarget);
    },
    beforeDestroy() {
      if (this.countdownTimer) {
        clearInterval(this.countdownTimer);
      }
    },
    methods: {
      showError(err) {
        const msg = typeof err === "string" ? err : (err && err.message) || "操作失败，请稍后重试";
        this.$message.error(msg);
      },
      validateAgreement() {
        if (!this.radio) {
          this.$message.error("请先勾选用户协议");
          return false;
        }
        return true;
      },
      async register() {
        if (!this.validateAgreement()) {
          return;
        }
        if (!this.form.phone || !this.form.code || !this.form.password || !this.form.confirmPassword) {
          this.$message.error("请完整填写注册信息");
          return;
        }
        if (this.form.password.length < 6) {
          this.$message.error("密码长度不能少于 6 位");
          return;
        }
        if (this.form.password !== this.form.confirmPassword) {
          this.$message.error("两次输入的密码不一致");
          return;
        }
        try {
          const payload = {
            phone: this.form.phone,
            code: this.form.code,
            nickName: this.form.nickName,
            password: this.form.password,
            confirmPassword: this.form.confirmPassword
          };
          const res = await axios.post("/user/register", payload);
          const token = res.data;
          if (token) {
            localStorage.setItem("token", token);
          }
          location.replace(this.redirectTarget);
        } catch (err) {
          this.showError(err);
        }
      },
      async sendCode() {
        if (!this.validateAgreement()) {
          return;
        }
        if (!this.form.phone) {
          this.$message.error("请输入手机号");
          return;
        }
        try {
          await axios.post("/user/code?phone=" + encodeURIComponent(this.form.phone));
          this.$message.success("验证码已发送，请注意查收");
          this.startCountdown();
        } catch (err) {
          this.showError(err);
        }
      },
      startCountdown() {
        this.disabled = true;
        let seconds = 60;
        this.codeBtnMsg = seconds + "秒后重发";
        if (this.countdownTimer) {
          clearInterval(this.countdownTimer);
        }
        this.countdownTimer = setInterval(() => {
          seconds -= 1;
          if (seconds <= 0) {
            clearInterval(this.countdownTimer);
            this.countdownTimer = null;
            this.disabled = false;
            this.codeBtnMsg = "发送验证码";
            return;
          }
          this.codeBtnMsg = seconds + "秒后重发";
        }, 1000);
      },
      goBack() {
        history.back();
      }
    }
  });
</script>
</body>
</html>
