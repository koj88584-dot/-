server:
  port: ${SERVER_PORT:8081}
spring:
  application:
    name: hmdp
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/hmdp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
  redis:
    host: ${REDIS_HOST:192.168.206.128}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:123456}
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:5MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:20MB}
mybatis-plus:
  type-aliases-package: com.hmdp.entity
logging:
  level:
    com.hmdp: ${APP_LOG_LEVEL:info}
    com.baomidou.mybatisplus.core.toolkit.support.ReflectLambdaMeta: ERROR
amap:
  key: ${AMAP_KEY:3ca0a2f25ab8827c53379129c07ac77e}
  web-key: ${AMAP_WEB_KEY:ee216a99d8b649b4ee30239b1d6b7b44}
  security-js-code: ${AMAP_SECURITY_JS_CODE:f6568b403165a5b880f461f1d2f4346e}
deepseek:
  api-key: ${DEEPSEEK_API_KEY:sk-92e4ae3b0d44a6dd57de0da311b42214dd42af96036c65a824d89cf07b67094d}
  base-url: ${DEEPSEEK_BASE_URL:https://fufu.iqach.top/v1}
  model: ${DEEPSEEK_MODEL:mimo-v2.5-pro}
hot-news:
  enabled: ${HOT_NEWS_ENABLED:true}
  alapi:
    enabled: ${HOT_NEWS_ALAPI_ENABLED:true}
    token: ${HOT_NEWS_ALAPI_TOKEN:}
    base-url: ${HOT_NEWS_ALAPI_BASE_URL:https://v3.alapi.cn}
    weibo-path: ${HOT_NEWS_ALAPI_WEIBO_PATH:/api/new/wbtop}
    toutiao-path: ${HOT_NEWS_ALAPI_TOUTIAO_PATH:/api/new/toutiao}
    zaobao-path: ${HOT_NEWS_ALAPI_ZAOBAO_PATH:/api/zaobao}
    tophub-path: ${HOT_NEWS_ALAPI_TOPHUB_PATH:/api/tophub}
    tophub-site-path: ${HOT_NEWS_ALAPI_TOPHUB_SITE_PATH:/api/tophub/site}
    site-cache-hours: ${HOT_NEWS_ALAPI_SITE_CACHE_HOURS:24}
    default-site-ids: ${HOT_NEWS_ALAPI_DEFAULT_SITE_IDS:BaXJOg,vaDrOK,gMJkaY,GMbZMo,yanZaZ,BOoYax}
  ttl-minutes: ${HOT_NEWS_TTL_MINUTES:30}
  stale-hours: ${HOT_NEWS_STALE_HOURS:72}
  asset-cache-hours: ${HOT_NEWS_ASSET_CACHE_HOURS:12}
  max-items: ${HOT_NEWS_MAX_ITEMS:20}
  google-news-rss-url: ${HOT_NEWS_GOOGLE_NEWS_RSS_URL:https://news.google.com/rss/search}
  max-age-days: ${HOT_NEWS_MAX_AGE_DAYS:14}
  allowed-hosts: ${HOT_NEWS_ALLOWED_HOSTS:news.google.com,bing.com,www.bing.com}
